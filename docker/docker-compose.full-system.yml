# Complete Irrigation System with Centralized MQTT
# Includes: PostgreSQL, Redis, Django, API, Celery, Mosquitto MQTT, Sensor Collector

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: irrigation-postgres
    environment:
      - POSTGRES_DB=irrigation_db
      - POSTGRES_USER=irrigation_user
      - POSTGRES_PASSWORD=irrigation_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - irrigation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irrigation_user -d irrigation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: irrigation-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - irrigation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: irrigation-mosquitto
    restart: unless-stopped
    ports:
      - "0.0.0.0:1883:1883"    # MQTT port
      - "0.0.0.0:9001:9001"    # WebSocket port
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - irrigation_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$SYS/#", "-C", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI service
  irrigation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irrigation-api
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - DATABASE_URL=postgresql://irrigation_user:irrigation_pass@postgres:5432/irrigation_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Django Web Application
  django-webapp:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: irrigation-django-webapp
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - POSTGRES_DB=irrigation_db
      - POSTGRES_USER=irrigation_user
      - POSTGRES_PASSWORD=irrigation_pass
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - DJANGO_SECRET_KEY=django-secret-key-change-me
      - DEBUG=True
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Sensor Data Collector (connects to local MQTT broker)
  sensor-collector:
    build:
      context: .
      dockerfile: Dockerfile.sensor_local
    container_name: irrigation-sensor-collector
    environment:
      - MQTT_BROKER=mosquitto  # Connect to local Mosquitto container
      - MQTT_PORT=1883
      - MQTT_TOPIC=sensor/+    # Subscribe to sensor topics
      - MQTT_KEEPALIVE=60
      - BACKEND_SERVER=http://django-webapp:8080  # Internal backend connection
      - BATCH_SIZE=25
      - BATCH_INTERVAL=180
      - MAX_RETRIES=3
      - RETRY_DELAY=30
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      django-webapp:
        condition: service_started

  # Celery Worker for task execution
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: irrigation-celery-worker
    command: celery -A celery_config.celery_app worker --loglevel=info --queues=irrigation_checks,irrigation_execution,irrigation_scheduling
    environment:
      - DATABASE_URL=postgresql://irrigation_user:irrigation_pass@postgres:5432/irrigation_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MQTT_BROKER=mosquitto  # Use local MQTT broker for device control
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  # Celery Beat for periodic tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: irrigation-celery-beat
    command: celery -A celery_config.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://irrigation_user:irrigation_pass@postgres:5432/irrigation_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Flower monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: irrigation-flower
    command: celery -A celery_config.celery_app flower --port=5555 --inspect_timeout=10000 --max_tasks=1000
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Optional: MQTT Web UI for monitoring
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer
    container_name: irrigation-mqtt-explorer
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - HTTP_PORT=4000
    networks:
      - irrigation_network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  irrigation_network:
    driver: bridge
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: irrigation-postgres
    environment:
      - POSTGRES_DB=irrigation_db
      - POSTGRES_USER=irrigation_user
      - POSTGRES_PASSWORD=irrigation_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - irrigation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irrigation_user -d irrigation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: irrigation-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - irrigation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI service (CRUD only)
  irrigation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irrigation-api
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - DATABASE_URL=postgresql://irrigation_user:irrigation_pass@postgres:5432/irrigation_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Django Web Application
  django-webapp:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: irrigation-django-webapp
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - POSTGRES_DB=irrigation_db
      - POSTGRES_USER=irrigation_user
      - POSTGRES_PASSWORD=irrigation_pass
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - DJANGO_SECRET_KEY=django-secret-key-change-me
      - DEBUG=True
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker for task execution
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: irrigation-celery-worker
    command: celery -A celery_config.celery_app worker --loglevel=info --queues=irrigation_checks,irrigation_execution,irrigation_scheduling
    environment:
      - DATABASE_URL=postgresql://irrigation_user:irrigation_pass@postgres:5432/irrigation_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MQTT_BROKER=192.168.8.151
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Beat for periodic tasks (replaces APScheduler)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: irrigation-celery-beat
    command: celery -A celery_config.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://irrigation_user:irrigation_pass@postgres:5432/irrigation_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Flower monitoring (optional - for Celery task monitoring)
  flower:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: irrigation-flower
    command: celery -A celery_config.celery_app flower --port=5555 --inspect_timeout=10000 --max_tasks=1000
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - irrigation_network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  irrigation_network:
    driver: bridge
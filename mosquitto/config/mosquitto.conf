# Mosquitto MQTT Broker Configuration
# For Irrigation Sensor Data Collection

# Basic Configuration
user mosquitto
max_inflight_messages 40
max_queued_messages 200
connection_messages true
log_timestamp true

# Network Configuration
port 1883
bind_address 0.0.0.0

# WebSocket Support (optional)
listener 9001
protocol websockets

# Security Configuration
# Allow anonymous connections (change for production)
allow_anonymous true

# Persistence Configuration
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Logging Configuration
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type debug

# Message Size Limits
message_size_limit 10485760

# Client Configuration
max_connections -1
max_keepalive 300

# Bridge Configuration (if connecting to other brokers)
# connection bridge-01
# address remote.mqtt.broker:1883
# topic sensor/+ both 0

# Custom Topics and Permissions
# topic read sensor/#
# topic write sensor/#
# topic read zigbee2mqtt/#
# topic write zigbee2mqtt/#
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Irrigation System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .status-badge {
            font-size: 0.85em;
        }
        .card-stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card-stat.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .card-stat.warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .card-stat.danger {
            background: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%);
        }
        .time-badge {
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'irrigation:dashboard' %}">
                <i class="fas fa-seedling me-2"></i>Irrigation System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'irrigation:dashboard' %}">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'irrigation:plan_list' %}">
                            <i class="fas fa-list me-1"></i>All Plans
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'irrigation:create_plan' %}">
                            <i class="fas fa-plus me-1"></i>Create Plan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'irrigation:temperature_dashboard' %}">
                            <i class="fas fa-thermometer-half me-1"></i>Temperature
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'irrigation:system_status' %}">
                            <i class="fas fa-server me-1"></i>System Status
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="http://localhost:5555" target="_blank">
                            <i class="fas fa-chart-line me-1"></i>Flower Monitoring
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>

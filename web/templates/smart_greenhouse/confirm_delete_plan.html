{% extends 'base.html' %}

{% block title %}Dzēst plānu{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><strong>Dzēst plānu</strong></div>
            <div class="card-body">
                <p>Vai tiešām dzēst plānu <strong>{{ plan.name }}</strong>?</p>
                <p class="text-muted">Cikli netiks dzēsti, tie kļūs nepiesaistīti.</p>
                <form method="post" class="d-flex justify-content-end gap-2">
                    {% csrf_token %}
                    <a href="{% url 'irrigation:plan_detail' plan.id %}" class="btn btn-outline-secondary">Atcelt</a>
                    <button type="submit" class="btn btn-danger">Dzēst plānu</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Pievienot Augu - Gudrā siltumnīca{% endblock %}

{% block content %}
<h1 class="h3 mb-3"><i class="fas fa-plus me-2"></i>Pievienot augu</h1>

<form method="post" class="card">
    {% csrf_token %}
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nosaukums *</label>
                <input class="form-control" type="text" name="name" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Šķirne</label>
                <input class="form-control" type="text" name="variety">
            </div>
            <div class="col-md-4">
                <label class="form-label">Stādīšanas datums *</label>
                <input class="form-control" type="date" name="planting_date" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Rinda *</label>
                <input class="form-control" type="number" name="location_row" min="1" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Kolonna *</label>
                <input class="form-control" type="number" name="location_column" min="1" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Laistīšanas biežums</label>
                <input class="form-control" type="number" name="watering_frequency" value="1" min="1">
            </div>
            <div class="col-md-4">
                <label class="form-label">Laistīšanas ilgums (sek)</label>
                <input class="form-control" type="number" name="watering_duration" value="300" min="1">
            </div>
            <div class="col-md-4">
                <label class="form-label">Ūdens daudzums (ml)</label>
                <input class="form-control" type="number" name="water_amount_ml" min="1">
            </div>
            <div class="col-md-6">
                <label class="form-label">Ražas datuma prognoze</label>
                <input class="form-control" type="date" name="harvest_date_estimate">
            </div>
            <div class="col-md-6">
                <label class="form-label">Ražas daudzuma prognoze (kg)</label>
                <input class="form-control" type="number" step="0.01" name="harvest_quantity_estimate" min="0">
            </div>
            <div class="col-12">
                <label class="form-label">Atrašanās apraksts</label>
                <input class="form-control" type="text" name="location_description">
            </div>
            <div class="col-12">
                <label class="form-label">Piezīmes</label>
                <textarea class="form-control" name="notes" rows="3"></textarea>
            </div>
        </div>
    </div>
    <div class="card-footer d-flex gap-2">
        <button class="btn btn-primary" type="submit">Saglabāt</button>
        <a class="btn btn-outline-secondary" href="{% url 'smart_greenhouse:plant_list' %}">Atcelt</a>
    </div>
</form>
{% endblock %}

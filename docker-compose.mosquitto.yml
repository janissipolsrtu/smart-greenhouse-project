# MQTT Broker (Mosquitto) Setup for WSL
# This sets up Mosquitto MQTT broker in a container on your main server

services:
  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: irrigation-mosquitto
    restart: unless-stopped
    ports:
      - "0.0.0.0:1883:1883"    # MQTT port
      - "0.0.0.0:9001:9001"    # WebSocket port (optional)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - irrigation_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$SYS/#", "-C", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: MQTT Web UI for monitoring
  mqtt-explorer:
    image: smeagolworms4/mqtt-explorer
    container_name: irrigation-mqtt-explorer
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - HTTP_PORT=4000
    networks:
      - irrigation_network
    profiles:
      - monitoring  # Start with: docker-compose --profile monitoring up -d

networks:
  irrigation_network:
    driver: bridge

volumes:
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local